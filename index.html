<!doctype html>
<html lang="ja">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>H view Hero</title>
  <style>
    * { box-sizing: border-box; }
    html, body { margin:0; min-height:100%; background:#f8f5f0; }
    body { overflow-x:hidden; }
    .hero {
      position:relative; width:100%; aspect-ratio:1672 / 941;
      overflow:hidden; isolation:isolate; background:#f8f5f0; touch-action:pan-y;
    }
    .hero-base {
      position:absolute; inset:0; z-index:0; display:block;
      width:100%; height:100%; object-fit:fill; user-select:none;
    }
    .cover-patch {
      position:absolute; z-index:1; display:block; object-fit:fill;
      pointer-events:none; user-select:none;
    }
    .motion-layer {
      position:absolute; z-index:2; pointer-events:none;
      transform:translate3d(0,0,0); will-change:transform;
    }
    .motion-part {
      display:block; width:100%; height:100%; object-fit:fill; user-select:none;
      backface-visibility:hidden; will-change:transform; transform:translate3d(0,0,0);
    }
    @keyframes cloudFloatA {
      0%,100% { transform: translate3d(-1%, 0, 0); }
      50% { transform: translate3d(1.5%, -11%, 0); }
    }
    @keyframes cloudFloatB {
      0%,100% { transform: translate3d(1%, 0, 0); }
      50% { transform: translate3d(-1.5%, -12%, 0); }
    }
    @keyframes flagWave {
      0%,100% { transform: skewY(-0.28deg) scaleX(0.998); }
      50% { transform: skewY(0.42deg) scaleX(0.992); }
    }
    @keyframes labelBobA {
      0%,100% { transform: translate3d(0, 0, 0); }
      50% { transform: translate3d(0, -2.6%, 0); }
    }
    @keyframes labelBobB {
      0%,100% { transform: translate3d(0, 0, 0); }
      50% { transform: translate3d(0, -3.1%, 0); }
    }
    .cloud-a { animation: cloudFloatA 4.6s ease-in-out infinite; }
    .cloud-b { animation: cloudFloatB 5.2s ease-in-out -1.3s infinite; }
    .flag-wave { animation: flagWave 2.8s ease-in-out infinite; }
    .label-a { animation: labelBobA 4.2s ease-in-out infinite; }
    .label-b { animation: labelBobB 4.8s ease-in-out -1.2s infinite; }

    @media (prefers-reduced-motion: reduce) {
      .motion-part { animation:none !important; }
      .motion-layer { transform:none !important; }
    }
  </style>
</head>
<body>
  <section class="hero" id="hero" aria-label="H view business hero">
    <img class="hero-base" src="assets/background_original.png" alt="H view">
    <img class="cover-patch" src="assets/cover_cloud_01.png" alt="" style="left:43.83971292%;top:16.89691817%;width:7.29665072%;height:7.33262487%;">
    <img class="cover-patch" src="assets/cover_cloud_02.png" alt="" style="left:77.45215311%;top:12.75239107%;width:7.17703349%;height:7.97024442%;">
    <img class="cover-patch" src="assets/cover_label_food.png" alt="" style="left:33.73205742%;top:15.83421892%;width:7.41626794%;height:9.56429330%;">
    <img class="cover-patch" src="assets/cover_label_fitness.png" alt="" style="left:85.76555024%;top:20.08501594%;width:8.07416268%;height:9.56429330%;">
    <img class="cover-patch" src="assets/cover_label_beauty.png" alt="" style="left:25.89712919%;top:60.25504782%;width:7.17703349%;height:8.71413390%;">
    <img class="cover-patch" src="assets/cover_label_marketing.png" alt="" style="left:85.70574163%;top:58.12964931%;width:10.88516746%;height:12.64612115%;">
    <img class="cover-patch" src="assets/cover_flag_h.png" alt="" style="left:71.88995215%;top:13.28374070%;width:5.50239234%;height:7.33262487%;">
    <div class="motion-layer" data-depth="0.55" style="left:43.83971292%;top:16.89691817%;width:7.29665072%;height:7.33262487%;">
      <img class="motion-part cloud-a" src="assets/part_cloud_01.png" alt="" draggable="false" style="transform-origin:50% 50%;">
    </div>
    <div class="motion-layer" data-depth="0.75" style="left:77.45215311%;top:12.75239107%;width:7.17703349%;height:7.97024442%;">
      <img class="motion-part cloud-b" src="assets/part_cloud_02.png" alt="" draggable="false" style="transform-origin:50% 50%;">
    </div>
    <div class="motion-layer" data-depth="0.38" style="left:33.73205742%;top:15.83421892%;width:7.41626794%;height:9.56429330%;">
      <img class="motion-part label-a" src="assets/part_label_food.png" alt="" draggable="false" style="transform-origin:50% 50%;">
    </div>
    <div class="motion-layer" data-depth="0.52" style="left:85.76555024%;top:20.08501594%;width:8.07416268%;height:9.56429330%;">
      <img class="motion-part label-b" src="assets/part_label_fitness.png" alt="" draggable="false" style="transform-origin:50% 50%;">
    </div>
    <div class="motion-layer" data-depth="0.32" style="left:25.89712919%;top:60.25504782%;width:7.17703349%;height:8.71413390%;">
      <img class="motion-part label-b" src="assets/part_label_beauty.png" alt="" draggable="false" style="transform-origin:50% 50%;">
    </div>
    <div class="motion-layer" data-depth="0.46" style="left:85.70574163%;top:58.12964931%;width:10.88516746%;height:12.64612115%;">
      <img class="motion-part label-a" src="assets/part_label_marketing.png" alt="" draggable="false" style="transform-origin:50% 50%;">
    </div>
    <div class="motion-layer" data-depth="0.45" style="left:71.88995215%;top:13.28374070%;width:5.50239234%;height:7.33262487%;">
      <img class="motion-part flag-wave" src="assets/part_flag_h.png" alt="" draggable="false" style="transform-origin:7% 50%;">
    </div>
  </section>
  <script>
    (() => {
      const hero = document.getElementById("hero");
      const layers = [...hero.querySelectorAll(".motion-layer")];
      const reducedMotion = window.matchMedia("(prefers-reduced-motion: reduce)");
      let targetX = 0, targetY = 0, currentX = 0, currentY = 0, rafId = null;

      function render() {
        currentX += (targetX - currentX) * 0.08;
        currentY += (targetY - currentY) * 0.08;
        for (const layer of layers) {
          const depth = Number(layer.dataset.depth || 0);
          layer.style.transform = `translate3d(${currentX * depth}px, ${currentY * depth}px, 0)`;
        }
        const moving = Math.abs(targetX - currentX) > 0.01 || Math.abs(targetY - currentY) > 0.01;
        rafId = moving ? requestAnimationFrame(render) : null;
      }
      function queueRender() {
        if (!rafId && !reducedMotion.matches) rafId = requestAnimationFrame(render);
      }
      hero.addEventListener("pointermove", (event) => {
        if (reducedMotion.matches) return;
        const rect = hero.getBoundingClientRect();
        const nx = ((event.clientX - rect.left) / rect.width - 0.5) * 2;
        const ny = ((event.clientY - rect.top) / rect.height - 0.5) * 2;
        targetX = nx * 1.8;
        targetY = ny * 1.15;
        queueRender();
      });
      hero.addEventListener("pointerleave", () => {
        targetX = 0; targetY = 0; queueRender();
      });
    })();
  </script>
</body>
</html>
