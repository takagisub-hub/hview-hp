<!doctype html>
<html lang="ja">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>H view Hero</title>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }
    html, body { width: 100%; height: 100%; background: #f8f5f0; overflow: hidden; }

    .hero {
      position: relative;
      width: 100vw;
      height: 100vh;
      overflow: hidden;
    }

    /* 全レイヤー共通：背景と同じ比率で表示 */
    .layer {
      position: absolute;
      top: 50%;
      left: 50%;
      transform: translate(-50%, -50%);
      /* 1672x941の画像を画面にfitさせる */
      width: 100%;
      height: 100%;
      object-fit: contain;
      object-position: center center;
      pointer-events: none;
      user-select: none;
    }

    /* パララックス用ラッパー */
    .parallax {
      position: absolute;
      inset: 0;
      will-change: transform;
    }

    /* アニメーション */
    @keyframes floatA {
      0%, 100% { transform: translateY(0); }
      50%       { transform: translateY(-8px); }
    }
    @keyframes floatB {
      0%, 100% { transform: translateY(0); }
      50%       { transform: translateY(-10px); }
    }
    @keyframes flagWave {
      0%, 100% { transform: skewY(-0.3deg) scaleX(0.998); }
      50%       { transform: skewY(0.5deg)  scaleX(0.992); }
    }
    @keyframes bobA {
      0%, 100% { transform: translateY(0); }
      50%       { transform: translateY(-6px); }
    }
    @keyframes bobB {
      0%, 100% { transform: translateY(0); }
      50%       { transform: translateY(-7px); }
    }
    @keyframes swayA {
      0%, 100% { transform: rotate(-0.4deg); }
      50%       { transform: rotate(0.5deg); }
    }
    @keyframes swayB {
      0%, 100% { transform: rotate(0.3deg); }
      50%       { transform: rotate(-0.4deg); }
    }

    .float-a  { animation: floatA  5.2s ease-in-out infinite; }
    .float-b  { animation: floatB  6s   ease-in-out -1.6s infinite; }
    .flag     { animation: flagWave 2.8s ease-in-out infinite; }
    .bob-a    { animation: bobA    4.2s ease-in-out infinite; }
    .bob-b    { animation: bobB    4.8s ease-in-out -1.2s infinite; }
    .sway-a   { animation: swayA   4.4s ease-in-out infinite; }
    .sway-b   { animation: swayB   5s   ease-in-out -1.4s infinite; }

    @media (prefers-reduced-motion: reduce) {
      .layer { animation: none !important; }
      .parallax { transform: none !important; }
    }
  </style>
</head>
<body>
  <section class="hero" id="hero">

    <!-- 背景（アニメなし） -->
    <img class="layer" src="assets/background_clean.png" alt="H view">

    <!-- 雲（ぷかぷか） -->
    <div class="parallax" data-depth="0.55">
      <img class="layer float-a" src="assets/cloud_01.png" alt="">
    </div>
    <div class="parallax" data-depth="0.75">
      <img class="layer float-b" src="assets/cloud_02.png" alt="">
    </div>

    <!-- 旗（揺れる） -->
    <div class="parallax" data-depth="0.45">
      <img class="layer flag" src="assets/flag_h.png" alt="">
    </div>

    <!-- ラベル（ふわっと上下） -->
    <div class="parallax" data-depth="0.38">
      <img class="layer bob-a" src="assets/label_food.png" alt="">
    </div>
    <div class="parallax" data-depth="0.52">
      <img class="layer bob-b" src="assets/label_fitness.png" alt="">
    </div>
    <div class="parallax" data-depth="0.32">
      <img class="layer bob-b" src="assets/label_beauty.png" alt="">
    </div>
    <div class="parallax" data-depth="0.46">
      <img class="layer bob-a" src="assets/label_marketing.png" alt="">
    </div>

    <!-- 木（ゆれる） -->
    <div class="parallax" data-depth="0.2">
      <img class="layer sway-a" src="assets/tree_yellow.png" alt="">
    </div>
    <div class="parallax" data-depth="0.25">
      <img class="layer sway-b" src="assets/tree_green.png" alt="">
    </div>
    <div class="parallax" data-depth="0.18">
      <img class="layer sway-a" src="assets/tree_red.png" alt="">
    </div>
    <div class="parallax" data-depth="0.22">
      <img class="layer sway-b" src="assets/tree_right.png" alt="">
    </div>

    <!-- 草（ゆれる） -->
    <div class="parallax" data-depth="0.15">
      <img class="layer sway-a" src="assets/grass.png" alt="">
    </div>

  </section>

  <script>
    const hero = document.getElementById('hero');
    const layers = [...hero.querySelectorAll('.parallax')];
    let tx=0, ty=0, cx=0, cy=0, raf=null;

    function render(){
      cx += (tx-cx)*0.08;
      cy += (ty-cy)*0.08;
      layers.forEach(l => {
        const d = Number(l.dataset.depth||0);
        l.style.transform = `translate3d(${cx*d}px,${cy*d}px,0)`;
      });
      raf = (Math.abs(tx-cx)>0.01||Math.abs(ty-cy)>0.01) ? requestAnimationFrame(render) : null;
    }

    hero.addEventListener('pointermove', e => {
      const r = hero.getBoundingClientRect();
      tx = ((e.clientX-r.left)/r.width  - 0.5) * 3.6;
      ty = ((e.clientY-r.top) /r.height - 0.5) * 2.3;
      if(!raf) raf = requestAnimationFrame(render);
    });
    hero.addEventListener('pointerleave', () => {
      tx=0; ty=0;
      if(!raf) raf = requestAnimationFrame(render);
    });
  </script>
</body>
</html>
