<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>H view — Business Field Company</title>
<style>
*{margin:0;padding:0;box-sizing:border-box;}
html,body{width:100%;height:100%;overflow:hidden;background:#F0EDE6;
  font-family:'Helvetica Neue',Arial,'Hiragino Kaku Gothic ProN',sans-serif;}

nav{
  position:fixed;top:0;left:0;right:0;z-index:300;
  display:flex;justify-content:space-between;align-items:center;
  padding:18px 40px;
}
.logo{font-size:26px;font-weight:900;color:#1a1a1a;letter-spacing:-1px;}
.logo span{color:#E8450A;}
.logo-sub{font-size:10px;letter-spacing:.18em;color:#E8450A;margin-top:2px;}
.hamburger{display:flex;flex-direction:column;gap:5px;cursor:pointer;}
.hamburger span{width:24px;height:2px;background:#1a1a1a;border-radius:2px;display:block;}

.scene{position:relative;width:100vw;height:100vh;overflow:hidden;}

/* 背景画像：そのまま全画面 */
.bg{
  position:absolute;inset:0;
  width:100%;height:100%;
  object-fit:contain;
  object-position:center center;
}

/* 雲だけ上に重ねてふわふわ */
.cloud{
  position:absolute;
  pointer-events:none;
  animation:cloudFloat 4s ease-in-out infinite;
}
.cloud-left  {width:19%;top:5%;left:1%; animation-delay:0s;}
.cloud-center{width:16%;top:2%;left:28%;animation-delay:-1.5s;}
.cloud-right {width:16%;top:4%;right:1%;animation-delay:-2.8s;}

@keyframes cloudFloat{
  0%,100%{transform:translateY(0);}
  50%    {transform:translateY(-10px);}
}
</style>
</head>
<body>

<nav>
  <div>
    <div class="logo">H <span>view</span></div>
    <div class="logo-sub">BUSINESS FIELD COMPANY</div>
  </div>
  <div class="hamburger"><span></span><span></span><span></span></div>
</nav>

<div class="scene">
  <img class="bg" src="./hview-hero.png" alt="H view">
  <img class="cloud cloud-left"   src="./cloud_left.png"   alt="">
  <img class="cloud cloud-center" src="./cloud_center.png" alt="">
  <img class="cloud cloud-right"  src="./cloud_right.png"  alt="">
</div>

</body>
</html>
