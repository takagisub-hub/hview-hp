<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>H view — Business Field Company</title>
<style>
*{margin:0;padding:0;box-sizing:border-box;}
html,body{width:100%;height:100%;overflow:hidden;background:#F0EDE6;
  font-family:'Helvetica Neue',Arial,'Hiragino Kaku Gothic ProN',sans-serif;}

nav{
  position:fixed;top:0;left:0;right:0;z-index:300;
  display:flex;justify-content:space-between;align-items:center;
  padding:18px 40px;
}
.logo{font-size:26px;font-weight:900;color:#1a1a1a;letter-spacing:-1px;}
.logo span{color:#E8450A;}
.logo-sub{font-size:10px;letter-spacing:.18em;color:#E8450A;margin-top:2px;}
.hamburger{display:flex;flex-direction:column;gap:5px;cursor:pointer;}
.hamburger span{width:24px;height:2px;background:#1a1a1a;border-radius:2px;display:block;}

/* シーン全体：元画像を背景に */
.scene{
  position:relative;
  width:100vw;height:100vh;
  overflow:hidden;
}

/* 元画像を背景に敷く */
.bg{
  position:absolute;
  /* 画像は3:2比率。画面に収めつつ中央配置 */
  top:50%;left:50%;
  transform:translate(-50%,-50%);
  width:100%;height:100%;
  object-fit:contain;
  object-position:center center;
}

/* 全アニメ要素はsceneに対してabsolute */
/* 元画像1536x1024の%座標でそのまま配置 */
/* object-fit:containで表示される実際の画像領域を計算してJSで補正 */

.part{
  position:absolute;
  pointer-events:none;
  transform-origin:center center;
}

/* 雲 */
.cloud-left{animation:cloudR 22s linear infinite;}
.cloud-center{animation:cloudL 30s linear infinite; animation-delay:-10s;}
.cloud-right{animation:cloudL 26s linear infinite; animation-delay:-5s;}
@keyframes cloudR{from{transform:translateX(-120%);}to{transform:translateX(600vw);}}
@keyframes cloudL{from{transform:translateX(120%);}to{transform:translateX(-600vw);}}

/* 旗 */
.flag-pole{
  transform-origin:50% 100%;
  animation:flagSway 1.8s ease-in-out infinite;
}
@keyframes flagSway{
  0%,100%{transform:rotate(0deg);}
  40%{transform:rotate(2deg);}
  70%{transform:rotate(-1.5deg);}
}

/* 自転車 */
.bicycle{
  animation:bikeRide 9s ease-in-out infinite;
}
@keyframes bikeRide{
  0%  {transform:translateX(0) scaleX(1);}
  40% {transform:translateX(-15vw) scaleX(1);}
  50% {transform:translateX(-15vw) scaleX(-1);}
  90% {transform:translateX(0) scaleX(-1);}
  100%{transform:translateX(0) scaleX(1);}
}

/* ラベル */
.label{
  animation:labelPop 6s ease-in-out infinite;
  opacity:0;
}
.label-food    {animation-delay:0.2s;}
.label-cafe    {animation-delay:1.0s;}
.label-fitness {animation-delay:1.8s;}
.label-beauty  {animation-delay:2.6s;}
.label-mkt     {animation-delay:3.4s;}
@keyframes labelPop{
  0%,8%    {opacity:0;transform:scale(.7) translateY(8px);}
  18%,72%  {opacity:1;transform:scale(1) translateY(0);}
  85%,100% {opacity:0;transform:scale(.7) translateY(8px);}
}

/* コピー（元画像の左上エリアに合わせて配置） */
.copy{
  position:absolute;
  z-index:50;
}
.copy h1{font-size:clamp(22px,3.2vw,48px);font-weight:900;line-height:1.25;color:#1a1a1a;margin-bottom:10px;}
.copy p{font-size:clamp(12px,1.2vw,16px);color:#E8450A;font-weight:600;line-height:1.7;margin-bottom:22px;}
.cta{
  display:inline-flex;align-items:center;gap:10px;
  background:#E8450A;color:#fff;
  padding:12px 24px;border-radius:50px;
  font-size:clamp(12px,1.1vw,15px);font-weight:700;
  cursor:pointer;border:none;
  box-shadow:0 6px 20px rgba(232,69,10,.3);
  transition:transform .2s,box-shadow .2s;
}
.cta:hover{transform:translateY(-2px);box-shadow:0 10px 28px rgba(232,69,10,.4);}
</style>
</head>
<body>

<nav>
  <div>
    <div class="logo">H <span>view</span></div>
    <div class="logo-sub">BUSINESS FIELD COMPANY</div>
  </div>
  <div class="hamburger"><span></span><span></span><span></span></div>
</nav>

<div class="scene" id="scene">
  <!-- 背景画像 -->
  <img class="bg" id="bg" src="./hview-hero.png" alt="H view">

  <!-- アニメーションパーツ（JSで位置計算） -->
  <img class="part cloud-left"   id="cloudL" src="./cloud_left.png"      alt="">
  <img class="part cloud-center" id="cloudC" src="./cloud_center.png"    alt="">
  <img class="part cloud-right"  id="cloudR" src="./cloud_right.png"     alt="">
  <img class="part flag-pole"    id="flag"   src="./flag_pole.png"       alt="">
  <img class="part bicycle"      id="bike"   src="./bicycle.png"         alt="">
  <img class="part label label-food"    id="lFood" src="./label_food.png"      alt="">
  <img class="part label label-cafe"    id="lCafe" src="./label_cafe.png"      alt="">
  <img class="part label label-fitness" id="lFit"  src="./label_fitness.png"   alt="">
  <img class="part label label-beauty"  id="lBeau" src="./label_beauty_p.png"  alt="">
  <img class="part label label-mkt"     id="lMkt"  src="./label_marketing.png" alt="">

  <!-- コピー -->
  <div class="copy" id="copy">
    <h1>多彩な事業で、<br>未来をもっと<br>豊かに。</h1>
    <p>Diverse ideas. One purpose.<br>More smiles for the future.</p>
    <button class="cta">私たちの事業を見る →</button>
  </div>
</div>

<script>
// 元画像サイズ
const IMG_W = 1536, IMG_H = 1024;

// 元画像内のパーツ座標（px）
const PARTS = {
  cloudL: {l:0,   t:0,   r:290,  b:140},
  cloudC: {l:290, t:50,  r:530,  b:170},
  cloudR: {l:1290,t:0,   r:1536, b:130},
  flag:   {l:1100,t:380, r:1360, b:640},
  bike:   {l:620, t:660, r:900,  b:870},
  lFood:  {l:40,  t:215, r:295,  b:340},
  lCafe:  {l:40,  t:335, r:295,  b:455},
  lFit:   {l:40,  t:455, r:295,  b:570},
  lBeau:  {l:290, t:590, r:545,  b:700},
  lMkt:   {l:290, t:700, r:590,  b:840},
};

// コピーエリア（元画像内の左上）
const COPY_AREA = {l:40, t:280, r:480, b:580};

function layout(){
  const vw = window.innerWidth;
  const vh = window.innerHeight;

  // object-fit:containで画像がどう表示されるか計算
  const imgRatio = IMG_W / IMG_H;
  const vRatio   = vw / vh;

  let dispW, dispH, offX, offY;
  if(vRatio > imgRatio){
    // 縦が基準
    dispH = vh;
    dispW = vh * imgRatio;
    offX  = (vw - dispW) / 2;
    offY  = 0;
  } else {
    // 横が基準
    dispW = vw;
    dispH = vw / imgRatio;
    offX  = 0;
    offY  = (vh - dispH) / 2;
  }

  const scaleX = dispW / IMG_W;
  const scaleY = dispH / IMG_H;

  // 各パーツを配置
  for(const [id, box] of Object.entries(PARTS)){
    const el = document.getElementById(id);
    if(!el) continue;
    const x = offX + box.l * scaleX;
    const y = offY + box.t * scaleY;
    const w = (box.r - box.l) * scaleX;
    const h = (box.b - box.t) * scaleY;
    el.style.left   = x + 'px';
    el.style.top    = y + 'px';
    el.style.width  = w + 'px';
    el.style.height = h + 'px';
  }

  // コピーエリア配置
  const copy = document.getElementById('copy');
  copy.style.left = (offX + COPY_AREA.l * scaleX) + 'px';
  copy.style.top  = (offY + COPY_AREA.t * scaleY) + 'px';
  copy.style.width = ((COPY_AREA.r - COPY_AREA.l) * scaleX) + 'px';
}

layout();
window.addEventListener('resize', layout);

// マウスパララックス（軽め）
const scene = document.getElementById('scene');
const parts = document.querySelectorAll('.part');
let tx=0,ty=0,cx=0,cy=0;
scene.addEventListener('pointermove',e=>{
  const r=scene.getBoundingClientRect();
  tx=((e.clientX-r.left)/r.width-.5)*16;
  ty=((e.clientY-r.top)/r.height-.5)*10;
});
scene.addEventListener('pointerleave',()=>{tx=0;ty=0;});
(function loop(){
  cx+=(tx-cx)*.06; cy+=(ty-cy)*.06;
  document.getElementById('bg').style.transform=
    `translate(-50%,-50%) scale(1.03) translate(${-cx*.3}px,${-cy*.3}px)`;
  requestAnimationFrame(loop);
})();
</script>
</body>
</html>
